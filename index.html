<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Ventas CAYMA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr auto; gap: 10px; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button.add-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button.add-btn:hover { background: #2980b9; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #34495e; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn-action { padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; color: white; cursor: pointer; border: none; margin-right: 5px; }
        .bg-blue { background: #3498db; }
        .bg-green { background: #27ae60; }

        /* Estilo del QR Modal */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
        .modal-box { background:white; padding:30px; border-radius:10px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generador de Boletas CAYMA E.I.R.L.</h2>
    
    <div class="grid-inputs">
        <input type="text" id="f-cliente" placeholder="Nombre del Cliente">
        
        <select id="f-producto">
            <option value="ZAPATILLAS URBANAS">Zapatillas Urbanas</option>
            <option value="BOTAS DE CUERO">Botas de Cuero</option>
            <option value="ZAPATOS FORMALES">Zapatos Formales</option>
            <option value="SANDALIAS DEPORTIVAS">Sandalias Deportivas</option>
            <option value="MANTENIMIENTO/LIMPIEZA">Kit de Limpieza</option>
        </select>

        <input type="number" id="f-monto" placeholder="Precio S/">
        <input type="text" id="f-id" placeholder="N° Boleta" value="B007-000">
        
        <button class="add-btn" onclick="agregarVenta()">Generar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-ventas"></tbody>
    </table>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="m-title"></h3>
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
        <p>Escanea para validar la compra</p>
        <button onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
    </div>
</div>

<script>
    function agregarVenta() {
        const cliente = document.getElementById('f-cliente').value;
        const producto = document.getElementById('f-producto').value;
        const monto = document.getElementById('f-monto').value;
        const id = document.getElementById('f-id').value;

        if(!cliente || !monto) return alert("Llena los datos");

        // Creamos el link con el nuevo parámetro "prod"
        const urlBase = "https://fascinating-platypus-2eb4b1.netlify.app/index.html";
        const linkFinal = `${urlBase}?id=${id}&monto=${monto}&cliente=${encodeURIComponent(cliente)}&prod=${encodeURIComponent(producto)}`;

        const tabla = document.getElementById('lista-ventas');
        const fila = tabla.insertRow();
        fila.innerHTML = `
            <td>${cliente}</td>
            <td><strong>${producto}</strong></td>
            <td>S/ ${parseFloat(monto).toFixed(2)}</td>
            <td>
                <button class="btn-action bg-blue" onclick="verQR('${linkFinal}', '${cliente}')">Ver QR</button>
                <a href="${linkFinal}" target="_blank" class="btn-action bg-green">Abrir Boleta</a>
            </td>
        `;
    }

    function verQR(link, nombre) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('m-title').innerText = "Validación: " + nombre;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: link, width: 180, height: 180 });
    }
</script>

</body>
</html>
