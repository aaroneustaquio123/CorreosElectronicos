<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Validación CAYMA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #333; display: flex; justify-content: center; padding: 20px; }
        .ticket { background: white; width: 300px; padding: 15px; border: 1px solid #000; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .line { border-top: 1px dashed #000; margin: 10px 0; }
        table { width: 100%; font-size: 11px; }
        .qr-box { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="ticket">
    <div class="center">
        <div class="bold" style="font-size: 18px;">CAYMA</div>
        <div style="font-size: 10px;">CAYMA E.I.R.L. | R.U.C. 20459759833</div>
        <div style="font-size: 9px;">AV. SANTA CRUZ NRO. 851 - MIRAFLORES</div>
        <div class="line"></div>
        <div class="bold">BOLETA ELECTRÓNICA</div>
        <div class="bold" id="folio">B000-00000000</div>
    </div>

    <div style="font-size: 11px; margin-top: 10px;">
        <div>FECHA: <span id="fecha">--/--/----</span></div>
        <div>CLIENTE: <span id="cliente">---</span></div>
    </div>

    <div class="line"></div>
    <table>
        <thead><tr><th>CANT</th><th>DESC</th><th>TOTAL</th></tr></thead>
        <tbody id="lista-productos">
            </tbody>
    </table>
    <div class="line"></div>

    <div style="text-align: right; font-size: 12px;">
        <div>OP. GRAVADA: S/ <span id="gravada">0.00</span></div>
        <div>IGV (18%): S/ <span id="igv">0.00</span></div>
        <div class="bold">TOTAL: S/ <span id="total">0.00</span></div>
    </div>

    <div class="qr-box">
        <div id="qrcode"></div>
        <p style="font-size: 8px;">VALIDACIÓN OFICIAL</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    // Captura de datos dinámicos
    const id = urlParams.get('id') || "B007-00023550";
    const monto = parseFloat(urlParams.get('monto') || "74.00");
    const cliente = urlParams.get('cliente') || "WILFREDO ALEJANDRO ZEGARRA LUNA";
    const prod = urlParams.get('prod') || "CALZADO - SANDALIAS";

    // Cálculos basados en la Boleta Electrónica [cite: 13]
    const gravada = (monto / 1.18).toFixed(2);
    const igv = (monto - gravada).toFixed(2);

    // Rellenar la boleta
    document.getElementById('folio').innerText = id;
    document.getElementById('total').innerText = monto.toFixed(2);
    document.getElementById('gravada').innerText = gravada;
    document.getElementById('igv').innerText = igv;
    document.getElementById('cliente').innerText = cliente;
    document.getElementById('fecha').innerText = new Date().toLocaleDateString();
    
    document.getElementById('lista-productos').innerHTML = `
        <tr><td>1.00</td><td>${prod}</td><td>${monto.toFixed(2)}</td></tr>
    `;

    // Generar el QR que apunta a ESTA misma URL con ESTOS datos
    new QRCode(document.getElementById("qrcode"), {
        text: window.location.href,
        width: 100,
        height: 100
    });
</script>
</body>
</html>
