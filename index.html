<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Emisión CAYMA - Oficial</title>
    <style>
        :root { --blue-cayma: #1a73e8; --red-recibo: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .main-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 900px; }
        
        .recibo-manual {
            border: 2px solid #333;
            padding: 25px;
            background: #fff;
            margin-bottom: 30px;
            position: relative;
        }
        .header-recibo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .serie-box { border: 2px solid var(--red-recibo); padding: 10px 20px; color: var(--red-recibo); font-weight: bold; font-size: 20px; }
        
        .row { margin: 18px 0; display: flex; align-items: center; gap: 10px; }
        .row label { font-weight: bold; color: #444; white-space: nowrap; }
        
        input, select {
            border: none;
            border-bottom: 1px solid #000;
            padding: 5px;
            font-size: 16px;
            background: transparent;
            outline: none;
        }
        .input-full { flex-grow: 1; }
        .input-dni { width: 110px; text-align: center; }
        .input-fecha { width: 130px; text-align: center; font-family: sans-serif; }
        .monto-style { width: 100px; font-weight: bold; font-size: 18px; color: var(--blue-cayma); border-bottom: 2px solid var(--blue-cayma); }

        .btn-emitir { 
            background: var(--blue-cayma); color: white; border: none; 
            padding: 15px 30px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px;
        }
        .btn-emitir:hover { background: #1557b0; }

        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .correlativo { color: var(--red-recibo); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Generador de Recibos CAYMA</h2>
    
    <div class="recibo-manual">
        <div class="header-recibo">
            <div>
                <strong style="font-size: 24px;">CAYMA E.I.R.L.</strong><br>
                <label>Fecha:</label> 
                <input type="date" id="f-fecha" class="input-fecha">
            </div>
            <div class="serie-box">
                N° <span id="num-serie">G173-2026-0001</span>
            </div>
        </div>

        <div class="row">
            <label>Recibí de:</label>
            <input type="text" id="f-cliente" class="input-full" placeholder="Nombre completo">
            <label>DNI:</label>
            <input type="text" id="f-dni" class="input-dni" placeholder="8 dígitos" maxlength="8">
        </div>

        <div class="row">
            <label>La cantidad de: S/</label>
            <input type="number" id="f-monto" class="monto-style" placeholder="0.00">
            
            <label style="margin-left: 15px;">Concepto:</label>
            <select id="f-producto" class="input-full">
                <option value="ZAPATILLAS URBANAS">ZAPATILLAS URBANAS</option>
                <option value="BOTAS DE CUERO">BOTAS DE CUERO</option>
                <option value="ZAPATOS FORMALES">ZAPATOS FORMALES</option>
                <option value="SANDALIAS DEPORTIVAS">SANDALIAS DEPORTIVAS</option>
                <option value="LIMPIEZA Y CUIDADO">KIT DE LIMPIEZA</option>
            </select>
        </div>

        <div class="row">
            <label>Observaciones:</label>
            <input type="text" id="f-obs" class="input-full" placeholder="Ej: Talla 42, Color Negro, etc.">
        </div>

        <button class="btn-emitir" onclick="procesarVenta()">EMITIR Y PASAR AL SIGUIENTE</button>
    </div>

    <h3>Historial de Ventas</h3>
    <table>
        <thead>
            <tr>
                <th>N° Recibo</th>
                <th>Cliente / DNI</th>
                <th>Producto / Obs.</th>
                <th>Monto</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-ventas"></tbody>
    </table>
</div>

<script>
    // Establecer fecha de hoy por defecto
    document.getElementById('f-fecha').valueAsDate = new Date();

    let contador = 1;

    function procesarVenta() {
        const serieActual = document.getElementById('num-serie').innerText;
        const cliente = document.getElementById('f-cliente').value;
        const dni = document.getElementById('f-dni').value;
        const monto = document.getElementById('f-monto').value;
        const producto = document.getElementById('f-producto').value;
        const obs = document.getElementById('f-obs').value;
        const fecha = document.getElementById('f-fecha').value;

        if(!cliente || !monto) return alert("Por favor ingresa Cliente y Monto");

        // Link para boleta.html (añadimos fecha y obs)
        const urlBase = window.location.origin + "/boleta.html";
        const linkFinal = `${urlBase}?id=${serieActual}&monto=${monto}&cliente=${encodeURIComponent(cliente)}&dni=${dni}&prod=${encodeURIComponent(producto)}&obs=${encodeURIComponent(obs)}&fecha=${fecha}`;

        const tabla = document.getElementById('lista-ventas');
        const fila = tabla.insertRow(0);
        fila.innerHTML = `
            <td class="correlativo">${serieActual}</td>
            <td>${cliente}<br><small>DNI: ${dni}</small></td>
            <td>${producto}<br><small style="color:gray">${obs}</small></td>
            <td><strong>S/ ${parseFloat(monto).toFixed(2)}</strong></td>
            <td><a href="${linkFinal}" target="_blank">Abrir Boleta</a></td>
        `;

        // Incremento
        contador++;
        let nuevoNumero = contador.toString().padStart(4, '0');
        document.getElementById('num-serie').innerText = `G173-2026-${nuevoNumero}`;

        // Limpiar para el siguiente cliente
        document.getElementById('f-cliente').value = "";
        document.getElementById('f-dni').value = "";
        document.getElementById('f-monto').value = "";
        document.getElementById('f-obs').value = "";
    }
</script>

</body>
</html>
